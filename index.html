<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinovo — Legal</title>
<style>
  :root{
    --verde:#8BC34A;
    --verde-dark:#6FA934;
    --fondo:#0A0A0A;
    --blanco:#FFFFFF;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--fondo);
    color:var(--blanco);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:24px;
    -webkit-font-smoothing:antialiased;
  }
  .card{
    max-width:420px;width:100%;text-align:center;
  }
  .logo{
    font-size:38px;font-weight:800;letter-spacing:-1px;margin-bottom:8px;
  }
  .logo span{color:var(--verde);}
  .sub{
    color:rgba(255,255,255,0.55);font-size:14px;margin-bottom:36px;
  }
  .link{
    display:flex;align-items:center;justify-content:space-between;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:18px 20px;margin-bottom:14px;
    color:var(--blanco);text-decoration:none;
    transition:background .2s,border-color .2s;
  }
  .link:hover{
    background:rgba(139,195,74,0.08);
    border-color:rgba(139,195,74,0.3);
  }
  .link-label{font-size:15px;font-weight:600;}
  .link-arrow{color:var(--verde);font-size:20px;}
  .footer{
    margin-top:32px;
    color:rgba(255,255,255,0.4);font-size:11.5px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">Din<span>o</span>vo</div>
    <div class="sub">Documentos legales</div>

    <a href="privacidad.html" class="link">
      <span class="link-label">Política de Privacidad</span>
      <span class="link-arrow">›</span>
    </a>
    <a href="terminos.html" class="link">
      <span class="link-label">Términos y Condiciones</span>
      <span class="link-arrow">›</span>
    </a>

    <div class="footer">República Dominicana · dinovosoporte@gmail.com</div>
  </div>
</body>
</html>
